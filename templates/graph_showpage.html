{% extends "layout.html" %}
{% block content %}

<div class="container mt-5">

    <!-- タイトル -->
    <div class="text-center mb-4">
        <h2>{{job[1]}}</h2>
        <p class="text-muted">最近の収益（10日）</p>
    </div>

    <!-- グラフカード -->
    <div class="card p-4 shadow mb-4">
        <canvas id="myChart"></canvas>
    </div>

    <!-- 戻るボタン -->
    <div class="text-center">
        <a href="{{url_for('overview')}}" class="btn btn-secondary">戻る</a>
    </div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const worktimes = {{ worktimes | tojson }};

    const dates = worktimes.map(w => 
        `${w.year}-${String(w.month).padStart(2, '0')}-${String(w.day).padStart(2, '0')}`
    );

    const times = worktimes.map(w => 
        w.hour + w.minute / 60
    );

    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: dates,
            datasets: [{
                label: '勤務時間（時間）',
                data: times,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

{% endblock %}
