{% extends "layout.html" %}
{% block content %}

<div class="container mt-5">

    <!-- タイトル -->
    <div class="text-center mb-4">
        <h2>{{job[1]}}</h2>
    </div>

    <!-- 勤務履歴テーブル -->
    <div class="card shadow mb-4">
        <div class="card-body">
            <table class="table table-striped text-center">
                <thead class="table-light">
                    <tr>
                        <th>日付</th>
                        <th>勤務時間</th>
                        <th>操作</th>
                    </tr>
                </thead>

                <tbody>
                    {% for worktime in worktimes %}
                    <tr>
                        <td>
                            {{worktime.year}}年{{worktime.month}}月{{worktime.day}}日
                        </td>
                        <td>{{worktime.time}}</td>
                        <td>
                            <form action="{{url_for('delete_worktime', id=worktime.id)}}" method="post">
                                <button class="btn btn-danger btn-sm">削除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- 登録フォーム -->
    <div class="card shadow p-4 mb-4">
        <h5 class="mb-3">勤務時間を登録</h5>

        <form method="POST" action="{{url_for('recordtime',id=job[0])}}">
            <div class="row mb-3">
                <div class="col">
                    <input type="number" class="form-control" name="year" placeholder="年">
                </div>
                <div class="col">
                    <input type="number" class="form-control" name="month" placeholder="月">
                </div>
                <div class="col">
                    <input type="number" class="form-control" name="day" placeholder="日">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <input type="number" class="form-control" name="hour" placeholder="時間">
                </div>
                <div class="col">
                    <input type="number" class="form-control" name="minute" placeholder="分">
                </div>
            </div>

            <button class="btn btn-success w-100">登録</button>
        </form>
    </div>

    <!-- 戻る -->
    <div class="text-center">
        <a href="{{url_for('record')}}" class="btn btn-secondary">戻る</a>
    </div>

</div>

{% endblock %}
